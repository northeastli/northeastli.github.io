<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>专辑</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    /* 选项卡容器 */
    .tabs {
      display: flex;
      margin: 20px 0;
      border-bottom: 2px solid #ccc;
    }

    .tab {
      padding: 10px 20px;
      cursor: pointer;
      font-weight: bold;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .tab.active {
      border-bottom-color: #1e3c72;
      color: #1e3c72;
    }

    /* 选项卡内容 */
    .tab-content {
      display: none; /* 默认隐藏 */
      margin-top: 20px;
    }

    .tab-content.active {
      display: block; /* 当前选中显示 */
    }

    /* 专辑网格 */
    .albums-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .album-card {
      background-color: #fff;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .album-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .album-card h3 {
      margin: 10px 0;
      font-size: 1.1rem;
    }

    .album-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <!-- 侧边栏复用 -->
  <div id="sidebar" class="sidebar">
    <button id="sidebar-toggle" class="sidebar-toggle">&#x25B6;</button>
    <nav class="sidebar-nav">
      <ul>
        <li><a href="../about/about.html">About</a></li>
        <li><a href="albums.html" class="active">专辑</a></li>
        <li><a href="../singles/singles.html">单曲</a></li>
        <li><a href="../live/live.html">现场</a></li>
      </ul>
    </nav>
  </div>

  <header>
    <h1>专辑页面</h1>
    <p>这里展示你的专辑、单曲和未发布单曲</p>
  </header>

  <main>
    <!-- 选项卡 -->
    <div class="tabs">
      <div class="tab active" data-tab="albums">专辑</div>
      <div class="tab" data-tab="singles">单曲</div>
      <div class="tab" data-tab="unreleased">未发布单曲</div>
    </div>

    <!-- 选项卡内容 -->
    <div id="albums" class="tab-content active">
      <div class="albums-grid">
        <div class="album-card"><img src="../../img/废柴.jpg" alt="专辑1"><h3>专辑1</h3></div>
        <div class="album-card"><img src="../../img/废话三篇.png" alt="专辑2"><h3>专辑2</h3></div>
        <div class="album-card"><img src="../../img/华北浪革.png" alt="专辑3"><h3>专辑3</h3></div>
      </div>
    </div>

    <div id="singles" class="tab-content">
      <p>这里显示单曲列表，可以是卡片或列表形式</p>
    </div>

    <div id="unreleased" class="tab-content">
      <p>这里显示未发布单曲列表</p>
    </div>
  </main>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        // 切换选项卡样式
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        // 切换内容显示
        const target = tab.dataset.tab;
        contents.forEach(c => c.classList.remove('active'));
        document.getElementById(target).classList.add('active');
      });
    });
  </script>

</body>
</html>
