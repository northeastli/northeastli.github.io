<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的简历 + 播放器</title>

  <!-- 样式 -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/carousel.css">
  <link rel="stylesheet" href="css/player.css">

  <!-- APlayer 样式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
</head>
<body>
  <header>
    <h1>华北浪漫革命</h1>
  </header>

  <main>
    <!-- 专辑轮播 -->
    <section id="album-carousel">
      <div class="carousel-container">
        <button class="carousel-btn prev">&lt;</button>
        <div class="carousel-track">
          <div class="carousel-card" data-link="#"><img src="img/废柴.jpg" alt="专辑1"><div class="album-name"></div></div>
          <div class="carousel-card" data-link="#"><img src="img/废话三篇.png" alt="专辑2"><div class="album-name"></div></div>
          <div class="carousel-card" data-link="#"><img src="img/华北浪革.png" alt="专辑3"><div class="album-name"></div></div>
          <div class="carousel-card" data-link="#"><img src="img/小歌集.png" alt="专辑3"><div class="album-name"></div></div>
        </div>
        <button class="carousel-btn next">&gt;</button>
      </div>
    </section>

    <!-- 播放器容器 -->
    <div id="aplayer-container"></div>
  </main>

  <footer>
    <p>© 2025 华北浪漫革命</p>
  </footer>

  <!-- APlayer JS -->
  <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>

  <!-- JS 模块 -->
  <script src="js/carousel.js"></script> <!-- 轮播图展示-->
  <script src="js/player.js"></script><!--负责 APlayer 播放器初始化和设置-->
  <script src="js/main.js"></script> <!--负责全局页面逻辑或通用功能  页面加载动画菜单或导航栏交互其他不属于轮播或播放器的 JS 功能-->
</body>
</html>
